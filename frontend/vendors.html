<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendors - ERP Purchase Order System</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="/static/css/styles.css" rel="stylesheet">
</head>
<body>
    <div class="wrapper">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-brand">
                <h4><i class="bi bi-box-seam me-2"></i>ERP</h4>
                <small>Purchase Order System</small>
            </div>
            
            <ul class="sidebar-nav nav flex-column">
                <li class="nav-item">
                    <a href="/dashboard" class="nav-link">
                        <i class="bi bi-speedometer2"></i>
                        Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/vendors" class="nav-link active">
                        <i class="bi bi-building"></i>
                        Vendors
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/products" class="nav-link">
                        <i class="bi bi-box"></i>
                        Products
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/create-po" class="nav-link">
                        <i class="bi bi-cart-plus"></i>
                        Create PO
                    </a>
                </li>
                <li class="nav-item mt-auto">
                    <a href="#" class="nav-link" onclick="ERP.handleLogout(); return false;">
                        <i class="bi bi-box-arrow-right"></i>
                        Logout
                    </a>
                </li>
            </ul>
        </nav>
        
        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="top-header">
                <h1 class="page-title">Vendor Management</h1>
                <div class="user-info">
                    <span id="userName">User</span>
                    <div class="user-avatar" id="userAvatar">U</div>
                </div>
            </header>
            
            <!-- Content Area -->
            <div class="content-area">
                <!-- Add Vendor Card -->
                <div class="card mb-4">
                    <div class="card-header">
                        <i class="bi bi-plus-circle me-2"></i>Add New Vendor
                    </div>
                    <div class="card-body">
                        <form id="vendorForm" onsubmit="saveVendor(event)">
                            <input type="hidden" id="vendorId">
                            <div class="row">
                                <div class="col-md-4 mb-3">
                                    <label for="vendorName" class="form-label">Vendor Name *</label>
                                    <input type="text" class="form-control" id="vendorName" required placeholder="Enter vendor name">
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label for="vendorContact" class="form-label">Contact Info</label>
                                    <input type="text" class="form-control" id="vendorContact" placeholder="Phone, email, address...">
                                </div>
                                <div class="col-md-2 mb-3">
                                    <label for="vendorRating" class="form-label">Rating (0-5)</label>
                                    <input type="number" class="form-control" id="vendorRating" min="0" max="5" step="0.1" value="0">
                                </div>
                                <div class="col-md-2 mb-3 d-flex align-items-end">
                                    <button type="submit" class="btn btn-primary w-100" id="vendorSubmitBtn">
                                        <i class="bi bi-plus-lg me-1"></i> Add Vendor
                                    </button>
                                </div>
                            </div>
                        </form>
                        <button type="button" class="btn btn-secondary btn-sm" id="cancelEditBtn" style="display: none;" onclick="cancelEdit()">
                            Cancel Edit
                        </button>
                    </div>
                </div>
                
                <!-- Vendors Table -->
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span><i class="bi bi-list-ul me-2"></i>Vendors List</span>
                        <button class="btn btn-sm btn-outline-primary" onclick="loadVendors()">
                            <i class="bi bi-arrow-clockwise"></i> Refresh
                        </button>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>Name</th>
                                        <th>Contact Info</th>
                                        <th>Rating</th>
                                        <th>Created</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="vendorsTableBody">
                                    <tr>
                                        <td colspan="6" class="text-center py-4">
                                            <div class="spinner-border text-primary" role="status">
                                                <span class="visually-hidden">Loading...</span>
                                            </div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Toast Container -->
    <div class="toast-container position-fixed top-0 end-0 p-3"></div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="/static/js/app.js"></script>
    
    <script>
        let editingVendorId = null;
        
        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            if (!ERP.initPage('vendors')) return;
            loadVendors();
        });
        
        // Load vendors from API
        async function loadVendors() {
            try {
                ERP.showLoading('vendorsTableBody');
                const vendors = await ERP.apiRequest('/vendors');
                renderVendorsTable(vendors);
            } catch (error) {
                ERP.showToast('Failed to load vendors: ' + error.message, 'danger');
            }
        }
        
        // Render vendors table
        function renderVendorsTable(vendors) {
            const tbody = document.getElementById('vendorsTableBody');
            
            if (vendors.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" class="text-center py-4">
                            <div class="empty-state">
                                <i class="bi bi-building" style="font-size: 3rem; opacity: 0.5;"></i>
                                <h5 class="mt-3">No vendors yet</h5>
                                <p class="text-muted">Add your first vendor using the form above</p>
                            </div>
                        </td>
                    </tr>
                `;
                return;
            }
            
            tbody.innerHTML = vendors.map(vendor => `
                <tr>
                    <td>${vendor.id}</td>
                    <td><strong>${vendor.name}</strong></td>
                    <td>${vendor.contact_info || '<span class="text-muted">-</span>'}</td>
                    <td>
                        <span class="badge bg-${vendor.rating >= 4 ? 'success' : vendor.rating >= 2 ? 'warning' : 'secondary'}">
                            ${vendor.rating.toFixed(1)} <i class="bi bi-star-fill"></i>
                        </span>
                    </td>
                    <td>${ERP.formatDate(vendor.created_at)}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary me-1" onclick="editVendor(${vendor.id})" title="Edit">
                            <i class="bi bi-pencil"></i>
                        </button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteVendor(${vendor.id})" title="Delete">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }
        
        // Save vendor (create or update)
        async function saveVendor(event) {
            event.preventDefault();
            
            const vendorData = {
                name: document.getElementById('vendorName').value.trim(),
                contact_info: document.getElementById('vendorContact').value.trim() || null,
                rating: parseFloat(document.getElementById('vendorRating').value) || 0
            };
            
            if (!vendorData.name) {
                ERP.showToast('Please enter a vendor name', 'warning');
                return;
            }
            
            const submitBtn = document.getElementById('vendorSubmitBtn');
            submitBtn.disabled = true;
            
            try {
                if (editingVendorId) {
                    // Update existing vendor
                    await ERP.apiRequest(`/vendors/${editingVendorId}`, {
                        method: 'PUT',
                        body: JSON.stringify(vendorData)
                    });
                    ERP.showToast('Vendor updated successfully!', 'success');
                } else {
                    // Create new vendor
                    await ERP.apiRequest('/vendors', {
                        method: 'POST',
                        body: JSON.stringify(vendorData)
                    });
                    ERP.showToast('Vendor created successfully!', 'success');
                }
                
                resetForm();
                loadVendors();
            } catch (error) {
                ERP.showToast('Failed to save vendor: ' + error.message, 'danger');
            } finally {
                submitBtn.disabled = false;
            }
        }
        
        // Edit vendor
        async function editVendor(id) {
            try {
                const vendor = await ERP.apiRequest(`/vendors/${id}`);
                
                editingVendorId = id;
                document.getElementById('vendorId').value = id;
                document.getElementById('vendorName').value = vendor.name;
                document.getElementById('vendorContact').value = vendor.contact_info || '';
                document.getElementById('vendorRating').value = vendor.rating;
                
                document.getElementById('vendorSubmitBtn').innerHTML = '<i class="bi bi-check-lg me-1"></i> Update Vendor';
                document.getElementById('cancelEditBtn').style.display = 'inline-block';
                
                // Scroll to form
                document.getElementById('vendorForm').scrollIntoView({ behavior: 'smooth' });
            } catch (error) {
                ERP.showToast('Failed to load vendor: ' + error.message, 'danger');
            }
        }
        
        // Delete vendor
        async function deleteVendor(id) {
            const confirmed = await ERP.confirmAction('Are you sure you want to delete this vendor? This will also delete all associated purchase orders.');
            
            if (!confirmed) return;
            
            try {
                await ERP.apiRequest(`/vendors/${id}`, { method: 'DELETE' });
                ERP.showToast('Vendor deleted successfully!', 'success');
                loadVendors();
            } catch (error) {
                ERP.showToast('Failed to delete vendor: ' + error.message, 'danger');
            }
        }
        
        // Cancel edit
        function cancelEdit() {
            resetForm();
        }
        
        // Reset form
        function resetForm() {
            editingVendorId = null;
            document.getElementById('vendorId').value = '';
            document.getElementById('vendorName').value = '';
            document.getElementById('vendorContact').value = '';
            document.getElementById('vendorRating').value = '0';
            document.getElementById('vendorSubmitBtn').innerHTML = '<i class="bi bi-plus-lg me-1"></i> Add Vendor';
            document.getElementById('cancelEditBtn').style.display = 'none';
        }
    </script>
</body>
</html>
