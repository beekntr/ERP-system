<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ERP Purchase Order System</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="/static/css/styles.css" rel="stylesheet">
    
    <!-- Google OAuth -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <!-- Logo -->
            <div class="login-logo">
                <i class="bi bi-box-seam"></i>
            </div>
            
            <!-- Title -->
            <h1 class="login-title">ERP System</h1>
            <p class="login-subtitle">Purchase Order Management</p>
            
            <!-- Google Sign In Button -->
            <div id="googleSignInBtn" class="mb-3"></div>
            
            <!-- OR Divider -->
            <div class="d-flex align-items-center my-4">
                <hr class="flex-grow-1">
                <span class="mx-3 text-muted">OR</span>
                <hr class="flex-grow-1">
            </div>
            
            <!-- Dev Login Button (for development/testing) -->
            <button class="dev-login-btn w-100" onclick="ERP.handleDevLogin()">
                <i class="bi bi-code-slash me-2"></i>
                Development Login
            </button>
            
            <p class="mt-4 text-muted small">
                <i class="bi bi-info-circle me-1"></i>
                Use Development Login for testing without Google OAuth
            </p>
        </div>
    </div>
    
    <!-- Toast Container -->
    <div class="toast-container position-fixed top-0 end-0 p-3"></div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="/static/js/app.js"></script>
    
    <script>
        // Check if already logged in
        document.addEventListener('DOMContentLoaded', function() {
            if (ERP.getToken()) {
                window.location.href = '/dashboard';
                return;
            }
            
            // Initialize Google OAuth
            ERP.initGoogleAuth();
        });
    </script>
</body>
</html>
